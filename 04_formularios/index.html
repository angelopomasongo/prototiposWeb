<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios HTML</title>
</head>
<body>
    <header>
        <h1>Formularios Html - ejemplos</h1>
        <hr>
    </header>
    <main>
        <h2>Formulario de regristro</h2>
        <p>Completa los siguientes datos</p>
        <form> <!--etiqueta para crear un formulario-->
            <label>Nombre:</label> <!--Etiqueta que describe el campo-->
            <input type="text" name="Nombre" placeholder="Ejemplo:Angelo Pomasongo"><!--campo de texto-->
            <br><br>
            <label>Correo Electronico:</label>
            <input type="email" name="Correo" placeholder="Ejemplo: angelopoma@gmail.com">
        </form>
    </main>
</body>
</html>
