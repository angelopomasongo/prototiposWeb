<!DOCTYPE html>
<!--declara el tipo de documento. Indica al navegador que usara HTML5-->
<html lang="es">
<!--Elemento principal del documento HTML.
lang="es" indica que el contenido esta en "español"-->

<head><!--Seccion de configuracion del documento-->
    <meta charset="UTF-8">
    <!--Define la codificacion de caracteres.
    UTF-8 permite usar correctamente tildes,ñ,simbolos, etc-->
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <!--hace que el sitio sea responsive
    Permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>Practicando HTML - img y video</title>
    <!--Titulo que aparece en el navegador-->
    <meta name="author" content="Angelo">
    <!--Indica quien creo el sitio web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!--conexion con hoja CSS de estilos-->

</head>
<body>
    <header><!--Encabezado del documento-->
        <h1>Sitio multimedia personal</h1>
    </header>
    <hr> <!--Crea una linea de division-->
    <main><!--seccion principal del documento-->
        <h2>mis datos:</h2>
        <p>Nombre: Angelo<br> <!--br es un salto de linea-->
            Curso: 3°c
        </p>
        <hr>
        <h2>Galeria multimedia</h2>
        <p>imagen de ejemplo</p>
        <img src="static/images/imagen1.png" alt="Primera imagen" width="300">
        <img src="static/images/imagen2.png" alt="segunda imagen" width="300">
        <img src="static/images/imagen3.png" alt="tercera imagen" width="300">
        <hr>
        <h2>videos</h2>
        <video width="400" controls >
            <source src="static/video/1 Minute vs 10 Year Build Challenge - MrBeast Gaming (1080p, h264).mp4" type="video/mp4">
        </video>
        <video width="400" controls>
        <source src="static/video/Pushing Top 1 Title In Mp40  Free Fire Solo Rank Pushing With Tips And Tricks  Ep-4 - Oshan Gaming (1080p, h264).mp4" type="video/mp4"</video>
    </main>
    <footer>
        <p style="text-align: center;">Todos los derechos reservados
            -<a href="https://es.wikipedia.org/wiki/Dragon_Ball">Mas Informacion</a> <!--Etiqueta <a> para vinculos-->
        </p>
    </footer>
</body>
</html>
